<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Browser Capture Manual Demo</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f6f3ee;
        color: #241f1a;
      }

      body {
        margin: 0;
        min-height: 2200px;
      }

      main {
        padding: 56px clamp(24px, 6vw, 88px);
      }

      section {
        max-width: 920px;
      }

      [data-testid="hero"] {
        border: 1px solid #d8cfc2;
        border-radius: 28px;
        background: #fffaf2;
        box-shadow: 0 24px 80px rgb(80 56 28 / 12%);
        padding: 40px;
      }

      h1 {
        font-size: clamp(42px, 7vw, 88px);
        line-height: 0.94;
        letter-spacing: -0.06em;
        margin: 0 0 24px;
      }

      button,
      input {
        border: 1px solid #241f1a;
        border-radius: 999px;
        font: inherit;
        padding: 12px 18px;
      }

      button {
        background: #241f1a;
        color: white;
        cursor: pointer;
      }

      input {
        min-width: 280px;
        background: white;
      }

      .controls {
        align-items: center;
        display: flex;
        flex-wrap: wrap;
        gap: 14px;
        margin-top: 28px;
      }

      [data-testid="status"] {
        color: #5c4f42;
        font-weight: 700;
        margin-top: 22px;
      }

      .spacer {
        height: 780px;
      }

      [data-testid="export-card"] {
        background: #16352f;
        border-radius: 24px;
        color: #f9f3e7;
        padding: 32px;
      }
    </style>
  </head>
  <body>
    <main>
      <section data-testid="hero">
        <p>Manual capture fixture</p>
        <h1>Record a deterministic local browser demo.</h1>
        <p>This workspace contains editable DemoProject for repeatable checkpoints.</p>
        <div class="controls">
          <button data-testid="start-demo" type="button">Start demo</button>
          <input data-testid="workspace-name" value="DemoProject" aria-label="Workspace name" />
        </div>
        <p data-testid="status">Capture plan is ready.</p>
      </section>

      <div class="spacer" aria-hidden="true"></div>

      <section data-testid="export-card">
        <h2>Export</h2>
        <p>Review the generated clip, screenshot, cursor events, and checkpoint summary.</p>
        <button data-testid="export-demo" type="button">Export demo</button>
      </section>
    </main>

    <script>
      document.querySelector("[data-testid='start-demo']").addEventListener("click", () => {
        document.querySelector("[data-testid='status']").textContent = "Capture plan is running.";
      });
    </script>
  </body>
</html>
