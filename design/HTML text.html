<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tinker Studio — Design Directions</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  html, body { margin: 0; padding: 0; height: 100%; }

  /* ---- Tinker editor chrome (theme-driven via CSS vars set on app root) ---- */
  .tk-btn {
    display: inline-flex; align-items: center; gap: 6px;
    font: 600 11.5px/1 inherit; font-family: inherit;
    color: var(--tk-text); background: var(--tk-btn-bg);
    border: 1px solid var(--tk-btn-border); border-radius: var(--tk-radius-sm);
    padding: 7px 12px; cursor: pointer; white-space: nowrap;
    transition: background 0.15s, border-color 0.15s, opacity 0.15s;
  }
  .tk-btn:hover:not(:disabled) { background: var(--tk-hover); }
  .tk-btn:disabled { opacity: 0.45; cursor: default; }
  .tk-btn-accent {
    background: var(--tk-accent); border-color: var(--tk-accent); color: var(--tk-accent-text);
  }
  .tk-btn-accent:hover:not(:disabled) { background: var(--tk-accent); filter: brightness(1.07); }

  .tk-iconbtn {
    display: inline-flex; align-items: center; justify-content: center;
    width: 28px; height: 28px; border-radius: var(--tk-radius-sm);
    color: var(--tk-text-sec); background: transparent; border: 1px solid transparent;
    cursor: pointer; transition: background 0.15s, color 0.15s;
  }
  .tk-iconbtn:hover:not(:disabled) { background: var(--tk-hover); color: var(--tk-text); }
  .tk-iconbtn:disabled { opacity: 0.32; cursor: default; }

  .tk-play {
    display: inline-flex; align-items: center; justify-content: center;
    width: 32px; height: 32px; border-radius: 99px; border: none; cursor: pointer;
    background: var(--tk-accent); color: var(--tk-accent-text);
    transition: filter 0.15s, transform 0.1s;
  }
  .tk-play:hover { filter: brightness(1.08); }
  .tk-play:active { transform: scale(0.94); }

  .tk-timecode {
    font-family: var(--tk-mono); font-size: 11.5px; color: var(--tk-text);
    min-width: 96px; letter-spacing: 0.01em;
  }

  .tk-vr { width: 1px; height: 20px; background: var(--tk-border); flex-shrink: 0; }

  .tk-chip {
    font: 500 10.5px/1 inherit; font-family: inherit;
    color: var(--tk-text-sec); background: transparent;
    border: 1px solid var(--tk-border); border-radius: 99px;
    padding: 5px 10px; cursor: pointer; white-space: nowrap;
    transition: background 0.15s, color 0.15s, border-color 0.15s;
  }
  .tk-chip:hover { background: var(--tk-accent-soft); color: var(--tk-text); border-color: var(--tk-accent); }

  .tk-tab {
    flex: 1; display: inline-flex; align-items: center; justify-content: center; gap: 5px;
    font: 600 11px/1 inherit; font-family: inherit;
    color: var(--tk-text-ter); background: transparent; border: 1px solid transparent;
    border-radius: var(--tk-radius-sm); padding: 6px 4px; cursor: pointer;
    transition: background 0.15s, color 0.15s;
  }
  .tk-tab:hover { color: var(--tk-text-sec); background: var(--tk-hover); }
  .tk-tab-on, .tk-tab-on:hover {
    color: var(--tk-text); background: var(--tk-card);
    border-color: var(--tk-border); box-shadow: 0 1px 2px rgba(0,0,0,0.06);
  }

  .tk-send {
    display: inline-flex; align-items: center; justify-content: center;
    width: 26px; height: 26px; margin: 4px; border-radius: 99px; border: none; cursor: pointer;
    background: var(--tk-accent); color: var(--tk-accent-text); flex-shrink: 0;
    transition: opacity 0.15s, filter 0.15s;
  }
  .tk-send:hover:not(:disabled) { filter: brightness(1.08); }
  .tk-send:disabled { opacity: 0.35; cursor: default; }

  .tk-rowcard {
    display: flex; align-items: center; gap: 9px;
    border: 1px solid; border-radius: var(--tk-radius-sm);
    padding: 8px 10px; cursor: pointer; transition: background 0.15s, border-color 0.15s;
  }
  .tk-rowcard:hover { background: var(--tk-hover); }

  .tk-dot {
    width: 5px; height: 5px; border-radius: 99px; display: inline-block;
    animation: tkPulse 1s ease-in-out infinite;
  }
  @keyframes tkPulse { 0%, 100% { opacity: 0.25; transform: translateY(0); } 50% { opacity: 1; transform: translateY(-2px); } }

  .tk-scan {
    position: absolute; top: 0; bottom: 0; width: 40%;
    animation: tkScan 1.1s linear infinite;
  }
  @keyframes tkScan { from { left: -40%; } to { left: 100%; } }

  .tk-glassbtn {
    color: rgba(255,255,255,0.66); background: transparent; border: 1px solid transparent;
    transition: background 0.15s, color 0.15s, border-color 0.15s;
  }
  .tk-glassbtn:hover { background: rgba(255,255,255,0.1); color: #fff; }
  .tk-glassbtn-on, .tk-glassbtn-on:hover {
    background: var(--tk-accent-soft); color: var(--tk-accent); border-color: var(--tk-accent-line);
  }

  .tk-note { font-size: 11px; line-height: 1.5; }
  .tk-note b { display: block; margin-bottom: 4px; }

  .tk-settings-wrap {
    position: relative;
    width: 100%;
    height: 100%;
  }

  .tk-settings-button {
    position: absolute;
    top: 12px;
    right: 12px;
    z-index: 20;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 30px;
    height: 30px;
    padding: 0;
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 8px;
    color: rgba(255,255,255,0.76);
    background: rgba(10,12,18,0.46);
    box-shadow: 0 8px 24px rgba(0,0,0,0.18);
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s, color 0.15s;
  }

  .tk-settings-button:hover,
  .tk-settings-button[aria-expanded="true"] {
    color: #fff;
    background: rgba(10,12,18,0.64);
    border-color: rgba(255,255,255,0.22);
  }

  .tk-settings-porcelain .tk-settings-button {
    color: rgba(22,28,40,0.68);
    background: rgba(250,249,246,0.86);
    border-color: rgba(22,28,40,0.12);
    box-shadow: 0 8px 22px rgba(25,32,46,0.12);
  }

  .tk-settings-porcelain .tk-settings-button:hover,
  .tk-settings-porcelain .tk-settings-button[aria-expanded="true"] {
    color: rgba(22,28,40,0.92);
    background: rgba(250,249,246,0.96);
    border-color: rgba(22,28,40,0.2);
  }

  .tk-theme-menu {
    position: absolute;
    top: 48px;
    right: 12px;
    z-index: 21;
    width: 238px;
    display: grid;
    gap: 8px;
    padding: 10px;
    border: 1px solid rgba(255,255,255,0.13);
    border-radius: 10px;
    background: rgba(15,17,24,0.96);
    box-shadow: 0 18px 54px rgba(0,0,0,0.32);
  }

  .tk-settings-porcelain .tk-theme-menu {
    background: rgba(250,249,246,0.98);
    border-color: rgba(22,28,40,0.12);
    box-shadow: 0 18px 54px rgba(25,32,46,0.16);
  }

  .tk-theme-menu-head {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    color: rgba(255,255,255,0.92);
    font: 700 11px/1 var(--tk-font, inherit);
    letter-spacing: 0;
    padding: 2px 2px 4px;
  }

  .tk-theme-menu-head span {
    color: rgba(255,255,255,0.42);
    font-weight: 600;
  }

  .tk-settings-porcelain .tk-theme-menu-head {
    color: rgba(22,28,40,0.9);
  }

  .tk-settings-porcelain .tk-theme-menu-head span {
    color: rgba(22,28,40,0.44);
  }

  .tk-theme-option {
    display: grid;
    grid-template-columns: 22px minmax(0, 1fr) 14px;
    align-items: center;
    gap: 9px;
    width: 100%;
    min-height: 42px;
    padding: 7px 8px;
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 8px;
    color: rgba(255,255,255,0.9);
    background: transparent;
    cursor: pointer;
    text-align: left;
  }

  .tk-theme-option:hover,
  .tk-theme-option[aria-pressed="true"] {
    border-color: var(--tk-accent, rgba(139,124,246,0.8));
    background: var(--tk-accent-soft, rgba(139,124,246,0.16));
  }

  .tk-settings-porcelain .tk-theme-option {
    color: rgba(22,28,40,0.88);
    border-color: rgba(22,28,40,0.12);
  }

  .tk-theme-option strong,
  .tk-theme-option small {
    display: block;
  }

  .tk-theme-option strong {
    font-size: 11px;
    line-height: 1.1;
  }

  .tk-theme-option small {
    color: rgba(255,255,255,0.48);
    font-size: 10px;
    line-height: 1.25;
    margin-top: 3px;
  }

  .tk-settings-porcelain .tk-theme-option small {
    color: rgba(22,28,40,0.5);
  }

  .tk-theme-swatch {
    width: 18px;
    height: 18px;
    border-radius: 99px;
    border: 1px solid rgba(255,255,255,0.18);
  }

  .tk-swatch-graphite { background: linear-gradient(135deg, #17191f, #d89d35); }
  .tk-swatch-porcelain { background: linear-gradient(135deg, #fbfaf6, #386bd8); }
  .tk-swatch-nocturne { background: linear-gradient(135deg, #10192c, #e0639a); }

  .tk-theme-check {
    color: var(--tk-accent, #8B7CF6);
    font-size: 13px;
    text-align: right;
  }
</style>
</head>
<body>
<div id="root"></div>

<script src="tinker/themes.js"></script>
<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="tinker/tool-rail.jsx"></script>
<script type="text/babel" src="tinker/demo-screen.jsx"></script>
<script type="text/babel" src="tinker/timeline.jsx"></script>
<script type="text/babel" src="tinker/side-panel.jsx"></script>
<script type="text/babel" src="tinker/app.jsx"></script>

<script type="text/babel">
  const T = window.TINKER_THEMES;

  const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
    "panelWidth": 20,
    "cAccent": "#E0639A"
  }/*EDITMODE-END*/;

  const THEME_CHOICES = [
    { id: "graphite", label: "Graphite", meta: "dark pro tool", theme: () => T.graphite },
    { id: "porcelain", label: "Porcelain", meta: "light editorial", theme: () => T.porcelain },
    { id: "nocturne", label: "Nocturne", meta: "blue-black studio", theme: (accent) => window.tinkerAccentize(T.nocturne, accent) },
  ];

  function SettingsIcon() {
    return (
      <svg width="15" height="15" viewBox="0 0 24 24" aria-hidden="true">
        <path d="M12 15.2a3.2 3.2 0 1 0 0-6.4 3.2 3.2 0 0 0 0 6.4Z" fill="none" stroke="currentColor" strokeWidth="1.8" />
        <path d="M19.4 15a1.6 1.6 0 0 0 .3 1.8l.1.1a2 2 0 0 1-2.8 2.8l-.1-.1a1.6 1.6 0 0 0-1.8-.3 1.6 1.6 0 0 0-1 1.5V21a2 2 0 0 1-4 0v-.2a1.6 1.6 0 0 0-1-1.5 1.6 1.6 0 0 0-1.8.3l-.1.1a2 2 0 1 1-2.8-2.8l.1-.1A1.6 1.6 0 0 0 4.6 15a1.6 1.6 0 0 0-1.5-1H3a2 2 0 0 1 0-4h.2a1.6 1.6 0 0 0 1.5-1 1.6 1.6 0 0 0-.3-1.8l-.1-.1a2 2 0 1 1 2.8-2.8l.1.1a1.6 1.6 0 0 0 1.8.3 1.6 1.6 0 0 0 1-1.5V3a2 2 0 0 1 4 0v.2a1.6 1.6 0 0 0 1 1.5 1.6 1.6 0 0 0 1.8-.3l.1-.1a2 2 0 1 1 2.8 2.8l-.1.1a1.6 1.6 0 0 0-.3 1.8 1.6 1.6 0 0 0 1.5 1h.2a2 2 0 0 1 0 4h-.2a1.6 1.6 0 0 0-1.5 1Z" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round" />
      </svg>
    );
  }

  function ThemeableTinkerApp({ defaultTheme, panelWidth, accent }) {
    const [themeKey, setThemeKey] = React.useState(defaultTheme);
    const [open, setOpen] = React.useState(false);
    const choice = THEME_CHOICES.find((item) => item.id === themeKey) || THEME_CHOICES[0];
    const activeTheme = choice.theme(accent);

    return (
      <div className={`tk-settings-wrap tk-settings-${themeKey}`}>
        <TinkerApp theme={activeTheme} panelWidth={panelWidth} />
        <button
          className="tk-settings-button"
          type="button"
          aria-label="Settings"
          aria-expanded={open}
          onClick={() => setOpen((value) => !value)}
        >
          <SettingsIcon />
        </button>
        {open ? (
          <div className="tk-theme-menu" role="dialog" aria-label="Settings panel">
            <div className="tk-theme-menu-head">
              <b>Theme</b>
              <span>Settings</span>
            </div>
            {THEME_CHOICES.map((item) => (
              <button
                key={item.id}
                className="tk-theme-option"
                type="button"
                aria-pressed={themeKey === item.id}
                onClick={() => setThemeKey(item.id)}
              >
                <span className={`tk-theme-swatch tk-swatch-${item.id}`} />
                <span>
                  <strong>{item.label}</strong>
                  <small>{item.meta}</small>
                </span>
                <span className="tk-theme-check">{themeKey === item.id ? "✓" : ""}</span>
              </button>
            ))}
          </div>
        ) : null}
      </div>
    );
  }

  function Page() {
    const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
    return (
      <React.Fragment>
      <DesignCanvas>
        <DCSection
          id="directions"
          title="Tinker Studio — three visual directions"
          subtitle="Same product, same 70/30 layout — only the skin changes. Everything is live: press play, scrub the timeline, select clips/zooms (then delete or undo), run scene detection, switch the right-panel tabs, and chat with the assistant — it applies real edits with diff-style cards."
        >
          <DCArtboard id="graphite" label="A · Graphite — dark pro tool · Helvetica + JetBrains Mono · indigo" width={1440} height={900}>
            <ThemeableTinkerApp defaultTheme="graphite" panelWidth={t.panelWidth} accent={t.cAccent} />
          </DCArtboard>
          <DCArtboard id="porcelain" label="B · Porcelain — light & editorial · Instrument Sans + Plex Mono · ink blue" width={1440} height={900}>
            <ThemeableTinkerApp defaultTheme="porcelain" panelWidth={t.panelWidth} accent={t.cAccent} />
          </DCArtboard>
          <DCArtboard id="nocturne" label="C · Nocturne — blue-black · Space Grotesk + Plex Mono · accent via Tweaks" width={1440} height={900}>
            <ThemeableTinkerApp defaultTheme="nocturne" panelWidth={t.panelWidth} accent={t.cAccent} />
          </DCArtboard>
          <DCPostIt top={-8} left={-230} width={190} rotate={-2}>
            <div className="tk-note">
              <b>Assumptions</b>
              70% editor / 30% panel · single-track timeline with a zoom/click event lane above the clips · AI as assistant (Cursor-style chat, edits-applied cards with Undo/Keep) · panel tabs: Chat, Zoom, Cursor, Frame.
            </div>
          </DCPostIt>
          <DCPostIt top={150} left={-230} width={190} rotate={1.5}>
            <div className="tk-note">
              <b>Try in any frame</b>
              ▶ Play — cursor glides, auto-zooms kick in · ask the chat to “tighten the pacing” · Frame tab restyles the wallpaper live · Detect scenes scans the track.
            </div>
          </DCPostIt>
        </DCSection>
      </DesignCanvas>
      <TweaksPanel>
        <TweakSection label="Layout" />
        <TweakSlider label="AI panel width" value={t.panelWidth} min={20} max={38} unit="%" onChange={(v) => setTweak("panelWidth", v)} />
        <TweakSection label="Direction C · Nocturne" />
        <TweakColor label="Accent" value={t.cAccent} options={["#3FB8A2", "#8B7CF6", "#E0639A", "#5B9BD9"]} onChange={(v) => setTweak("cAccent", v)} />
      </TweaksPanel>
      </React.Fragment>
    );
  }

  ReactDOM.createRoot(document.getElementById("root")).render(<Page />);
</script>
</body>
</html>
